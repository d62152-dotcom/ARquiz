<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <!--<meta name="viewport" content="width=1100">-->
    <title>AR Quiz</title>
    <script src = "https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src = "https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body {
        font-family: sans-serif;
      }
      * {
        box-sizing: border-box;
      }

      /* スコアの表示 */
      /*
      #score {
        position: fixed;
        z-index: 10000;
        background-color: rgba(0, 0, 0, 0.5);
        color: #fff;
        text-align: center;
        padding: 20px;
        top: 10px;
        right: 10px;
        width: 70px;
        height: 70px;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
      }
      */

      #scoreValue {
        font-size: 36px;
        font-weight: bold;
      }

      /* メッセージの表示 */
      body {
        margin: 0;
      }
      #message {
        position: fixed;
        z-index: 10;
        left: 5%;
        bottom: 100px;
        width: 90%;
        padding: 10px;
        color: #fff;
        font-weight: bold;
        background-color: rgba(0,0,0,.8);
        border-radius: 20px;
        border: 3px solid #fff;
        display: none;
      }

      /* 解答ボタンの表示 */
      
      button{
        cursor: pointer;
      }
      .active{
        background-color: rgba(0, 0, 255, 1);
        border: 1px solid #fff;
        border-radius: 5px;
        cursor: pointer;
      }
      .inactive{
        background-color: rgb(112, 112, 114);
        border: 1px solid #fff;
        border-radius: 5px;
        cursor: not-allowed;
      }
      #ab1,#ab2,#ab3,#ab4{
        display:none;
      }
      
      #answerButton {
        background-color: transparent;
        color: #fff;
        text-align: center;
        font-size: 16px;
        font-weight: bold;
        font-family: sans-serif;
        border: none;
        cursor: pointer;
      }
      

      .stamp-history {
        position: fixed;
        top: 10px;
        left: 10px;
        display: flex;
        flex-direction: row;
        gap: 10px;
        z-index: 100;
      }

      .stamp-history img {
        width: 30px;
        height: 30px;
      }

      .feedback-image {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 100;
      }

      .feedback-image img {
        width: 360px;
        height: 360px;
      }
      /*スコア*/
      #answeredCount {
        position: fixed;
        z-index: 10000;
        background-color: rgba(0, 0, 0, 0.5);
        color: #fff;
        text-align: center;
        padding: 20px;
        top: 10px;  /* ← スコア表示の下 */
        right: 10px;
        width: 200px;
        height: 120px;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
      }
      /*画像ボックス*/
      #ImagesBox{
        position: fixed;
        z-index: 9999;
        background-color: rgba(0, 0, 0, 0.5);
        color: #FFF;
        text-align: center;
        padding: 5px;
        top: 70%;
        right: 10px;
        width: 170;
        height: 200;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
      }
      
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <!-- スコア表示 -->
    <!--<div id="score">
      <div>Score<br><span id="scoreValue"></span></div>
    </div>-->
    <!-- 回答数の表示 -->
    <div id="answeredCount">
      <div>Answer<br><span id="answeredValue"></span></div>
    </div>
    <!--次の画像を表示-->
    <div id="ImagesBox">
     <div>この<ruby>画像<rt>がぞう</rt></ruby>を<ruby>探<rt>さが</rt></ruby>そう!<br><img id="Images" src="./images/marker/pattern-senbeityan.png" width="150" height="150"></div>
    <script>
      // ローカルストレージからスコアを読み込んで表示
      window.onload = function () {
        /*
        let savedScore = localStorage.getItem('score');
        if (savedScore !== null) {
          document.getElementById('scoreValue').textContent = savedScore;
        }
        */
         const answered = localStorage.getItem('AnserQuestion');
    if (answered !== null) {
      document.getElementById('answeredValue').textContent = answered + ' / ' + localStorage.getItem('totalQuestion');
    }
      };

      // スコアをローカルストレージに保存
      function saveScore() {
        let score = Math.floor(Math.random() * 100);  // ランダムなスコア
        localStorage.setItem('score', score);  // ローカルストレージに保存
        document.getElementById('scoreValue').textContent = score;  // 表示更新
      }

    </script>

    <!-- メッセージ表示 -->
    <div id="message"></div>

    <!-- スタンプ履歴表示 -->
    <div class="stamp-history"></div>

    <!-- フィードバック画像表示 -->
    <div class="feedback-image" style="display: none;">
      <img id="feedbackImage" src="" alt="feedback">
    </div>




    <a-scene
      vr-mode-ui="enabled: false;"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <!-- 画像 -->
      <a-assets>
        <img id="cursor" src="./assets/cursor_scope.png">
      </a-assets>


      <!-- Quiz01 -->
      <a-marker type="pattern" preset="ab1" url="./images/marker/pattern-yanaseraion.patt" id="marker01">
      </a-marker> 

      <!-- Quiz02 -->
      <a-marker type="pattern" preset="ab2" url="./images/marker/pattern-syougajizou.patt" id="marker02">
      </a-marker>

      <!-- Quiz03 -->
      <a-marker type="pattern" preset="ab3" url="./images/marker/pattern-syougatyan.patt" id="marker03">
      </a-marker>

      <!-- Quiz04 -->
      <a-marker type="pattern" preset="ab4" url="./images/marker/pattern-senbeityan.patt" id="marker04">
       </a-marker>

      <a-entity camera>
        <!-- カーソルの表示 -->
        <a-entity cursor="fuse: true;"
          position="0 0 -3"
          geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.1"
          material="src: #cursor; shader: flat; transparent: true">
        </a-entity>
      </a-entity>
    </a-scene>

    <!-- 解答を確定するボタン -->
    <!-- Quiz1 -->
    
    <button id="ab1" onclick="location.href='./Quiz/1/quiz1.html'" class="inactive" disabled>
    </button>
    
    <!-- Quiz2 -->
    <button id="ab2" onclick="location.href='./Quiz/2/quiz2.html'" class="inactive" disabled>
    </button>
    <!-- Quiz3 -->
    <button id="ab3" onclick="location.href='./Quiz/3/quiz3.html'" class="inactive" disabled>
    </button>
    <!-- Quiz4 -->
    <button id="ab4" onclick="location.href='./Quiz/4/quiz4.html'" class="inactive" disabled>
    </button>

    <script>
      function toggleClass() {
        const button = document.getElementById('ab1');
        let test2 = localStorage.getItem("is-quiz1-comprete");
        test2 = Number(test2);
        if (test2 === 1) {
          button.classList.remove('inactive');
          button.classList.add('active');
        }
      }
      toggleClass();
    </script>

    <script type="text/javascript" src="./renewquiz.js"></script>
  </body>
</html>
